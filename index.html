<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徐庶 · 侠者之义</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;font-family:"PingFang SC","Microsoft YaHei",serif}

.bg{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;
  background:url(https://picsum.photos/id/1074/1920/1080) center center / cover no-repeat;
  filter:brightness(0.15) contrast(1.2);
}

.container{
  max-width:820px;margin:0 auto;padding:10vh 20px 12vh;
  position:relative;z-index:1;color:#fff;text-align:center
}

.title{
  font-size:36px;letter-spacing:3px;color:#ffd700;margin-bottom:50px;
  text-shadow:0 0 15px rgba(255,215,0,0.4)
}

.line{
  font-size:20px;line-height:2.4;margin-bottom:26px;opacity:0.9
}

.highlight{
  font-size:28px;color:#ffd700;font-weight:500;
  margin:50px 0;line-height:1.8;
  text-shadow:0 0 12px rgba(255,215,0,0.5)
}

.sign{
  text-align:right;font-size:18px;color:#ccc;margin-top:70px;opacity:0.8
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="container">
  <div class="title">徐庶 · 侠者之义</div>

  <div class="line">路见不平，拔刀相助，乃侠者之义也。</div>
  <div class="line">大丈夫当行侠重义，仗剑天下。</div>
  <div class="line">若除贪官恶吏，天下自为之一清。</div>
  <div class="line">吾等当上体天心，下济黎民。</div>
  <div class="line">天乃高且远，安可事事自下。</div>
  <div class="line">以吾等之才，何不同辅一主，共成王霸之业。</div>
  <div class="line">吾等并力同心相通，大事何不可成哉。</div>
  <div class="line">百姓陷于苦海，而吾却难以济之。</div>
  <div class="line">愿以手中长剑，荡尽天下魍魉。</div>
  <div class="line">吾为侠也，不愧持正之心，不负三尺之剑。</div>
  <div class="line">君人者欲安，莫若以民为本，平政爱之。</div>
  <div class="line">君无民臣，何以名君？故知民之重也。</div>
  <div class="line">民惟邦本，本固邦宁，奈何知而不行？</div>
  <div class="line">终有一鸣惊高阙，君何孤愤使面沉。</div>

  <div class="highlight">
    艰苦砺身为大任<br>
    河沙淘尽始见金
  </div>

  <div class="line">不可同辅黄叔，实为平生大憾。</div>
  <div class="sign">— heqie8</div>
</div>
</body>
</html>

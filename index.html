<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>徐庶 · 侠者之义</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  font-family: "Microsoft YaHei", serif;
}

/* 关键修复：让图片完整显示，不裁切，显示头部 */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  background: url("bg.jpg") top center; /* 这里修复：top = 从头部开始显示 */
  background-size: 100% auto; /* 完整显示整张图，不拉伸 */
  background-repeat: no-repeat;
  filter: brightness(1.3) contrast(1.08);
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.2);
  z-index: 1;
}

.text-group {
  position: absolute;
  z-index: 2;
  color: #fff;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  font-weight: 500;
}

.title {
  top: 5%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 36px;
  letter-spacing: 2px;
}

.top-left {
  top: 18%;
  left: 5%;
  font-size: 18px;
  line-height: 2;
}

.top-right {
  top: 18%;
  right: 5%;
  font-size: 18px;
  line-height: 2;
  text-align: right;
}

.middle {
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 20px;
  line-height: 2.2;
  text-align: center;
}

.bottom-left {
  bottom: 15%;
  left: 5%;
  font-size: 18px;
  line-height: 2;
}

.bottom-right {
  bottom: 15%;
  right: 5%;
  font-size: 18px;
  line-height: 2;
  text-align: right;
}
</style>
</head>

<body>
  <div class="hero">
    <div class="overlay"></div>

    <div class="text-group title">徐庶 · 侠者之义</div>

    <div class="text-group top-left">
      路见不平，拔刀相助，乃侠者之义也。<br>
      大丈夫当行侠重义，仗剑天下。<br>
      愿以手中长剑，荡尽天下魍魉。
    </div>

    <div class="text-group top-right">
      若除贪官恶吏，天下自为之一清。<br>
      吾等当上体天心，下济黎民。<br>
      吾为侠也，不愧持正之心，不负三尺之剑。
    </div>

    <div class="text-group middle">
      君人者欲安，莫若以民为本，平政爱之。<br>
      君无民臣，何以名君？故知民之重也。<br>
      民惟邦本，本固邦宁，奈何知而不行？
    </div>

    <div class="text-group bottom-left">
      艰苦砺身为大任<br>
      河沙淘尽始见金<br>
      终有一鸣惊高阙，君何孤愤使面沉。
    </div>

    <div class="text-group bottom-right">
      不可同辅皇叔，实为平生大憾。<br><br>
      — heqie8
    </div>
  </div>
</body>
</html>
